<!DOCTYPE html>
<html>

<head>

<title>YouTube Shorts Scheduler Dashboard</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}

h1{
color:#38bdf8;
}

.container{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-top:30px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:12px;
width:260px;
box-shadow:0px 0px 15px rgba(0,0,0,0.4);
}

.label{
font-size:16px;
color:#94a3b8;
margin-bottom:8px;
}

.value{
font-size:32px;
font-weight:bold;
}

.status{
margin-top:40px;
font-size:14px;
color:#94a3b8;
}

.refresh{
margin-top:30px;
padding:10px 20px;
background:#38bdf8;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>YouTube Shorts Automation Dashboard</h1>

<div class="container">

<div class="card">
<div class="label">Pending Videos</div>
<div class="value" id="pending">-</div>
</div>

<div class="card">
<div class="label">Uploaded This Run</div>
<div class="value" id="uploaded">-</div>
</div>

<div class="card">
<div class="label">Processed This Run</div>
<div class="value" id="processed">-</div>
</div>

<div class="card">
<div class="label">Last Scheduler Run</div>
<div class="value" id="lastrun">-</div>
</div>

</div>

<button class="refresh" onclick="loadStatus()">Refresh Dashboard</button>

<div class="status">
Scheduler reads from <b>scheduler-status.json</b> generated by GitHub automation.
</div>

<script>

async function loadStatus(){

try{

const res = await fetch("scheduler-status.json?cache=" + Date.now())

const data = await res.json()

document.getElementById("pending").innerText = data.pending_videos
document.getElementById("uploaded").innerText = data.uploaded_this_run
document.getElementById("processed").innerText = data.total_processed_this_run
document.getElementById("lastrun").innerText = new Date(data.last_run).toLocaleString()

}catch(e){

console.log("Status file not ready yet")

}

}

loadStatus()

</script>

</body>
</html>
