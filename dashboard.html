<!DOCTYPE html>
<html>

<head>

<title>YouTube Shorts Automation Dashboard</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}

h1{
color:#38bdf8;
}

.container{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-top:30px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:12px;
width:260px;
box-shadow:0px 0px 15px rgba(0,0,0,0.4);
}

.label{
font-size:16px;
color:#94a3b8;
margin-bottom:8px;
}

.value{
font-size:30px;
font-weight:bold;
}

.progressBox{
margin-top:40px;
width:600px;
}

.progressBar{
width:100%;
height:22px;
background:#334155;
border-radius:10px;
overflow:hidden;
}

.progressFill{
height:100%;
background:#22c55e;
width:0%;
}

.refresh{
margin-top:30px;
padding:10px 20px;
background:#38bdf8;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.footer{
margin-top:40px;
font-size:14px;
color:#94a3b8;
}

</style>

</head>

<body>

<h1>YouTube Shorts Automation Dashboard</h1>

<div class="container">

<div class="card">
<div class="label">Pending Videos</div>
<div class="value" id="pending">-</div>
</div>

<div class="card">
<div class="label">Uploaded This Run</div>
<div class="value" id="uploaded">-</div>
</div>

<div class="card">
<div class="label">Processed This Run</div>
<div class="value" id="processed">-</div>
</div>

<div class="card">
<div class="label">Last Scheduler Run</div>
<div class="value" id="lastrun">-</div>
</div>

<div class="card">
<div class="label">Days Of Content Remaining</div>
<div class="value" id="days">-</div>
</div>

</div>


<div class="progressBox">

<h3>Upload Progress</h3>

<div class="progressBar">
<div class="progressFill" id="progress"></div>
</div>

</div>


<button class="refresh" onclick="loadStatus()">Refresh Dashboard</button>


<div class="footer">
Scheduler reads from <b>scheduler-status.json</b> generated by GitHub automation.
</div>


<script>

async function loadStatus(){

try{

const res = await fetch("scheduler-status.json?cache=" + Date.now())

const data = await res.json()

const pending = data.pending_videos
const uploaded = data.uploaded_this_run
const processed = data.total_processed_this_run

document.getElementById("pending").innerText = pending
document.getElementById("uploaded").innerText = uploaded
document.getElementById("processed").innerText = processed

document.getElementById("lastrun").innerText =
new Date(data.last_run).toLocaleString()


/* estimate days remaining */

const uploadsPerDay = 4

const daysRemaining = Math.ceil(pending / uploadsPerDay)

document.getElementById("days").innerText = daysRemaining


/* progress bar */

const total = pending + processed

let percent = 0

if(total>0){
percent = (processed / total) * 100
}

document.getElementById("progress").style.width = percent + "%"


}catch(e){

console.log("status file missing")

}

}

loadStatus()

</script>

</body>
</html>
