<!DOCTYPE html>
<html>
<head>

<title>YouTube Shorts Automation</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
margin:0;
padding:40px;
}

.header{
display:flex;
align-items:center;
gap:12px;
margin-bottom:30px;
}

.header img{
width:36px;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#1f1f1f;
padding:22px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.card h4{
margin:0;
color:#aaa;
font-weight:500;
}

.metric{
font-size:34px;
margin-top:10px;
font-weight:bold;
}

.progress{
height:14px;
background:#2a2a2a;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:14px;
background:#ff0000;
width:0%;
}

button{
background:#ff0000;
border:none;
color:white;
padding:12px 18px;
border-radius:6px;
cursor:pointer;
margin-top:20px;
}

.footer{
margin-top:30px;
color:#777;
font-size:13px;
}

</style>

</head>

<body>

<div class="header">

<img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg">

<h2>YouTube Shorts Automation</h2>

</div>

<div class="grid">

<div class="card">
<h4>Pending Videos</h4>
<div class="metric" id="pending">--</div>
</div>

<div class="card">
<h4>Uploaded This Run</h4>
<div class="metric" id="uploaded">--</div>
</div>

<div class="card">
<h4>Processed This Run</h4>
<div class="metric" id="processed">--</div>
</div>

<div class="card">
<h4>Last Scheduler Run</h4>
<div class="metric" style="font-size:20px" id="lastRun">--</div>
</div>

<div class="card">
<h4>Days Of Content Remaining</h4>
<div class="metric" id="days">--</div>
</div>

</div>


<div class="grid">

<div class="card">
<h4>Content Scheduled Until</h4>
<div class="metric" style="font-size:20px" id="scheduledUntil">--</div>
</div>

<div class="card">
<h4>Estimated Channel Runway</h4>
<div class="metric" style="font-size:20px" id="runway">--</div>
</div>

</div>


<h3>Upload Progress</h3>

<div class="progress">
<div class="bar" id="progressBar"></div>
</div>


<button onclick="load()">Refresh Dashboard</button>

<div class="footer">

Dashboard reads from <b>scheduler-status.json</b> generated by GitHub automation.

</div>

<script>

async function load(){

const res = await fetch("scheduler-status.json?nocache="+Date.now());

const data = await res.json();

document.getElementById("pending").innerText = data.pending_videos;
document.getElementById("uploaded").innerText = data.uploaded_this_run;
document.getElementById("processed").innerText = data.total_processed_this_run;

const runDate = new Date(data.last_run);

document.getElementById("lastRun").innerText =
runDate.toLocaleString();

const days = Math.ceil(data.pending_videos / 4);

document.getElementById("days").innerText = days;

const lastSchedule = new Date(data.last_schedule_date);

document.getElementById("scheduledUntil").innerText =
lastSchedule.toDateString();

const runway = new Date();

runway.setDate(runway.getDate() + days);

document.getElementById("runway").innerText =
runway.toDateString();

const progress =
((data.total_processed_this_run / 4) * 100);

document.getElementById("progressBar").style.width =
progress + "%";

}

load();

/* AUTO REFRESH */

setInterval(load,20000);

</script>

</body>

</html>
