<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>YouTube Shorts Automation Dashboard</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
margin:0;
padding:40px;
}

h1{
color:#ff0000;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:20px;
}

.card{

background:#1f1f1f;
padding:25px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.4);

}

.card h3{

color:#bbbbbb;
margin:0 0 10px 0;
font-size:16px;

}

.metric{

font-size:32px;
font-weight:bold;

}

.progress{

background:#333;
height:14px;
border-radius:20px;
overflow:hidden;
margin-top:10px;

}

.bar{

height:100%;
background:#ff0000;

}

button{

background:#ff0000;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
margin-top:20px;

}

button:hover{
opacity:0.8;
}

</style>

</head>

<body>

<h1>YouTube Shorts Automation Dashboard</h1>

<div class="grid">

<div class="card">
<h3>Pending Videos</h3>
<div class="metric" id="pending">-</div>
</div>

<div class="card">
<h3>Uploaded This Run</h3>
<div class="metric" id="uploaded">-</div>
</div>

<div class="card">
<h3>Processed This Run</h3>
<div class="metric" id="processed">-</div>
</div>

<div class="card">
<h3>Last Scheduler Run</h3>
<div class="metric" id="last_run" style="font-size:20px;">-</div>
</div>

<div class="card">
<h3>Days Of Content Remaining</h3>
<div class="metric" id="days">-</div>
</div>

<div class="card">
<h3>Content Scheduled Until</h3>
<div class="metric" id="until" style="font-size:20px;">-</div>
</div>

</div>

<h3>Upload Progress</h3>

<div class="progress">
<div class="bar" id="progress_bar" style="width:0%"></div>
</div>

<button onclick="load()">Refresh Dashboard</button>

<script>

async function load(){

const res = await fetch("scheduler-status.json?t="+Date.now());

const data = await res.json();

document.getElementById("pending").innerText=data.pending_videos;

document.getElementById("uploaded").innerText=data.uploaded_this_run;

document.getElementById("processed").innerText=data.total_processed_this_run;

document.getElementById("last_run").innerText=new Date(data.last_run).toLocaleString();

const days=Math.floor(data.pending_videos/4);

document.getElementById("days").innerText=days;

const base=new Date(data.last_schedule_date);

base.setDate(base.getDate()+days);

document.getElementById("until").innerText=base.toDateString();

const progress=(data.total_processed_this_run/4)*100;

document.getElementById("progress_bar").style.width=progress+"%";

}

load();

</script>

</body>

</html>
