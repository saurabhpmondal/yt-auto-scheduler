<!DOCTYPE html>
<html>
<head>
<title>YouTube Scheduler Dashboard</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
padding:40px;
}

.card{
background:#1e293b;
padding:25px;
margin:20px 0;
border-radius:10px;
width:400px;
}

.title{
font-size:20px;
margin-bottom:10px;
color:#38bdf8;
}

.value{
font-size:28px;
}

</style>
</head>

<body>

<h1>YouTube Automation Dashboard</h1>

<div class="card">
<div class="title">Pending Videos</div>
<div class="value" id="pending">-</div>
</div>

<div class="card">
<div class="title">Uploaded This Run</div>
<div class="value" id="uploaded">-</div>
</div>

<div class="card">
<div class="title">Last Run</div>
<div class="value" id="lastRun">-</div>
</div>

<script>

fetch("scheduler-status.json")
.then(res => res.json())
.then(data => {

document.getElementById("pending").innerText = data.pending_videos
document.getElementById("uploaded").innerText = data.uploaded_this_run
document.getElementById("lastRun").innerText = data.last_run

})

</script>

</body>
</html>
