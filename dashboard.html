<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>YouTube Shorts Automation Dashboard</title>

<style>

body{
background:#0f0f0f;
color:#ffffff;
font-family:Roboto,Arial;
margin:0;
padding:40px;
}

.header{
display:flex;
align-items:center;
margin-bottom:40px;
}

.logo{
width:42px;
height:30px;
background:#ff0000;
border-radius:6px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
margin-right:12px;
}

.logo span{
font-size:16px;
}

h1{
margin:0;
font-size:28px;
}

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;

}

.card{

background:#1f1f1f;
padding:25px;
border-radius:14px;
box-shadow:0 4px 14px rgba(0,0,0,0.5);
transition:0.2s;

}

.card:hover{
transform:translateY(-3px);
box-shadow:0 6px 18px rgba(0,0,0,0.6);
}

.card h3{
font-size:14px;
color:#aaaaaa;
margin-bottom:10px;
font-weight:500;
}

.metric{

font-size:34px;
font-weight:bold;

}

.metric-small{
font-size:20px;
}

.progress-wrapper{
margin-top:30px;
}

.progress-label{
margin-bottom:10px;
color:#aaa;
}

.progress{

width:100%;
height:16px;
background:#2a2a2a;
border-radius:20px;
overflow:hidden;

}

.bar{

height:100%;
background:#ff0000;
width:0%;
transition:0.5s;

}

button{

margin-top:30px;
background:#ff0000;
border:none;
color:white;
padding:12px 24px;
border-radius:8px;
font-size:14px;
cursor:pointer;

}

button:hover{
opacity:0.85;
}

.footer{

margin-top:40px;
color:#777;
font-size:13px;

}

</style>

</head>

<body>

<div class="header">

<div class="logo">
<span>▶</span>
</div>

<h1>YouTube Shorts Automation</h1>

</div>


<div class="grid">

<div class="card">
<h3>Pending Videos</h3>
<div class="metric" id="pending">-</div>
</div>

<div class="card">
<h3>Uploaded This Run</h3>
<div class="metric" id="uploaded">-</div>
</div>

<div class="card">
<h3>Processed This Run</h3>
<div class="metric" id="processed">-</div>
</div>

<div class="card">
<h3>Last Scheduler Run</h3>
<div class="metric metric-small" id="last_run">-</div>
</div>

<div class="card">
<h3>Days Of Content Remaining</h3>
<div class="metric" id="days">-</div>
</div>

<div class="card">
<h3>Content Scheduled Until</h3>
<div class="metric metric-small" id="until">-</div>
</div>

</div>


<div class="progress-wrapper">

<div class="progress-label">
Upload Progress
</div>

<div class="progress">
<div class="bar" id="progress_bar"></div>
</div>

</div>


<button onclick="load()">Refresh Dashboard</button>


<div class="footer">
Dashboard reads from <b>scheduler-status.json</b> generated by GitHub automation.
</div>


<script>

async function load(){

const res = await fetch("scheduler-status.json?t="+Date.now());

const data = await res.json();

document.getElementById("pending").innerText=data.pending_videos;

document.getElementById("uploaded").innerText=data.uploaded_this_run;

document.getElementById("processed").innerText=data.total_processed_this_run;

document.getElementById("last_run").innerText=new Date(data.last_run).toLocaleString();

const days=Math.floor(data.pending_videos/4);

document.getElementById("days").innerText=days;

const base=new Date(data.last_schedule_date);

base.setDate(base.getDate()+days);

document.getElementById("until").innerText=base.toDateString();

const progress=(data.total_processed_this_run/4)*100;

document.getElementById("progress_bar").style.width=progress+"%";

}

load();

</script>

</body>
</html>
